name: "🔬 Re-estimar Parâmetros EM (Mensal)"

on:
  schedule:
    # Roda no dia 1 de cada mês às 3h UTC
    - cron: '0 3 1 * *'
  # Permite disparo manual pela aba Actions do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  re-estimar:
    name: Suavizador RTS + EM + Filtro Kalman
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 3. Garante snapshot atualizado antes de re-estimar ─────────
      - name: "🕸️  Scraper Wikipedia → snapshot_pesquisas.json (atualizado)"
        run: python scripts/notebook_pesquisas.py
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: '1'

      # ── 4. Suavizador + EM ─────────────────────────────────────────
      - name: "🧮  Suavizador RTS + EM → kalman_parametros.json"
        run: python scripts/Suavizador_de_Kalman.py
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: '1'

      # ── 5. Filtro de Kalman online com novos parâmetros ───────────
      - name: "📡  Filtro de Kalman online → kalman_filtro_resultados.json + .png"
        run: python scripts/kalman_filtro_online.py
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: '1'

      # ── 6. Commit e push ───────────────────────────────────────────
      - name: Commit e push de todos os artefatos atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add snapshot_pesquisas.json \
                  kalman_parametros.json \
                  kalman_filtro_resultados.json \
                  kalman_filtro_online.png

          if git diff --staged --quiet; then
            echo "ℹ️  Nenhuma mudança detectada."
          else
            git commit -m "🔬 Auto: re-estima parâmetros EM · $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push origin main
            echo "✅  Push realizado com sucesso."
          fi
