name: "📊 Atualizar Dados (a cada 6h)"

on:
  schedule:
    # Roda às 0h, 6h, 12h e 18h UTC todos os dias
    - cron: '0 0,6,12,18 * * *'
  # Permite disparo manual pela aba Actions do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-dados:
    name: Scraper + Filtro de Kalman
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # ── 2. Python ──────────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 3. Scraper ─────────────────────────────────────────────────
      - name: "🕸️  Executar scraper Wikipedia → snapshot_pesquisas.json"
        run: python scripts/notebook_pesquisas.py
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: '1'

      # ── 4. Filtro de Kalman online ─────────────────────────────────
      - name: "📡  Executar filtro de Kalman → kalman_filtro_resultados.json + .png"
        run: python scripts/kalman_filtro_online.py
        env:
          MPLBACKEND: Agg
          PYTHONUNBUFFERED: '1'

      # ── 5. Commit e push ───────────────────────────────────────────
      - name: Commit e push das atualizações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add snapshot_pesquisas.json \
                  kalman_filtro_resultados.json \
                  kalman_filtro_online.png

          if git diff --staged --quiet; then
            echo "ℹ️  Nenhuma mudança nos dados. Nada a commitar."
          else
            git commit -m "🤖 Auto: atualiza dados · $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
            echo "✅  Push realizado com sucesso."
          fi
